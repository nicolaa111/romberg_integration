<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: #141e30;
            color: white;
            text-align: center;
            padding: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid white;
            padding: 8px;
        }
    </style>

</head>
<body>

<h1>Romberg Calculator</h1>

<form method="POST">
    <input name="function" placeholder="function (e.g sin(x))"><br>
    <input name="a" placeholder="a"><br>
    <input name="b" placeholder="b"><br>
    <input name="n" placeholder="n"><br>
    <br>
    <button>Compute</button>
</form>

{% if result %}
<h2>Result: {{ result }}</h2>

<table>
{% for row in table %}
<tr>
{% for item in row %}
<td>{{ item }}</td>
{% endfor %}
</tr>
{% endfor %}
</table>
{% endif %}

<br>
<a href="/">Home</a>

</body>
</html>
